# ============================================================
#  MQTT CAN 采集系统 — 配置文件
# ============================================================

# ---- Broker 连接 ----
broker.address  = tcp://test.mosquitto.org:1883
broker.keepalive = 60

# ---- 发布者 ----
publisher.client_id  = vehicle-can-publisher-001
publisher.vehicle_id = VIN_LX_TEST_001
publisher.cold_start = false
publisher.publish_interval_ms = 1000

# ---- 订阅者 ----
subscriber.client_id = vehicle-can-subscriber-001

# ---- Topic & QoS 定义 ----
# QoS: 0=最多一次(快但可能丢), 1=至少一次, 2=恰好一次(最可靠)
# 发布者和订阅者必须使用相同的 Topic 名和 QoS

# 原始 CAN 帧 — 量大用 QoS 0
topics.raw.topic = vehicle/can/raw
topics.raw.qos   = 0

# 信号快照 — 重要数据用 QoS 1
topics.signals.topic = vehicle/can/signals
topics.signals.qos   = 1

# JSON 调试 — QoS 1
topics.json.topic = vehicle/can/json
topics.json.qos   = 1
